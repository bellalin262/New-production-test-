<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異常案例查詢系統</title>
<style>
:root{
  --ink:#1c1a17;
  --paper:#f7f4ee;
  --paper-dim:#ece7dc;
  --line:#d8d0c0;
  --rust:#b5502f;
  --rust-deep:#8a3a20;
  --moss:#5c6b4f;
  --gold:#c08a2e;
  --ok:#4a7a5e;
  --warn:#b5502f;
  --pending:#9b7a2e;
  --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --serif:'Noto Serif TC','Songti TC',serif;
  --sans:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
body{min-height:100vh;}

/* ---- Header ---- */
.masthead{
  border-bottom:3px solid var(--ink);
  padding:28px 24px 18px;
  background:var(--paper);
  position:relative;
}
.masthead::after{
  content:'';
  position:absolute;
  bottom:-3px;left:0;right:0;height:1px;
  background:repeating-linear-gradient(90deg,var(--ink) 0 6px,transparent 6px 10px);
}
.masthead-row{
  display:flex;justify-content:space-between;align-items:baseline;
  max-width:920px;margin:0 auto;flex-wrap:wrap;gap:8px;
}
.masthead h1{
  font-family:var(--serif);
  font-size:28px;
  font-weight:700;
  margin:0;
  letter-spacing:0.5px;
}
.masthead .tag{
  font-family:var(--mono);
  font-size:11px;
  color:var(--rust-deep);
  letter-spacing:1.5px;
  text-transform:uppercase;
}
.masthead .meta{
  font-family:var(--mono);
  font-size:11px;
  color:#80766a;
}
.status-line{
  max-width:920px;margin:10px auto 0;
  font-family:var(--mono);font-size:11.5px;color:#80766a;
  display:flex;gap:14px;align-items:center;flex-wrap:wrap;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ok);display:inline-block;}
.dot.off{background:#b0a890;}
.dot.busy{background:var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#refreshBtn{
  font-family:var(--mono);font-size:11px;color:var(--rust-deep);
  background:none;border:1px solid var(--line);padding:2px 8px;border-radius:3px;
  cursor:pointer;
}
#refreshBtn:hover{background:var(--paper-dim);}

/* ---- Main layout ---- */
.wrap{max-width:920px;margin:0 auto;padding:32px 24px 80px;}

.search-block{margin-bottom:8px;}
.search-label{
  font-family:var(--mono);font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--rust-deep);margin-bottom:8px;display:block;
}
.search-row{display:flex;gap:10px;}
#queryInput{
  flex:1;font-family:var(--serif);font-size:19px;
  padding:14px 16px;border:2px solid var(--ink);border-radius:2px;
  background:#fff;color:var(--ink);
}
#queryInput:focus{outline:none;border-color:var(--rust);box-shadow:0 0 0 3px rgba(181,80,47,0.12);}
#searchBtn{
  font-family:var(--sans);font-weight:600;font-size:15px;
  padding:0 26px;border:2px solid var(--ink);background:var(--ink);color:var(--paper);
  border-radius:2px;cursor:pointer;letter-spacing:0.5px;
}
#searchBtn:hover{background:var(--rust-deep);border-color:var(--rust-deep);}
.hint{font-family:var(--mono);font-size:11.5px;color:#9a9082;margin-top:8px;}

/* category chips */
.chips{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;}
.chip{
  font-family:var(--mono);font-size:10.5px;padding:4px 10px;border:1px solid var(--line);
  border-radius:14px;color:#5a5246;cursor:pointer;background:#fff;
}
.chip:hover{border-color:var(--rust);color:var(--rust-deep);}

/* ---- Results ---- */
.results{margin-top:34px;}
.empty-state{
  text-align:center;padding:60px 20px;color:#a89f8f;
}
.empty-state .glyph{font-size:34px;margin-bottom:10px;display:block;font-family:var(--serif);}
.empty-state p{font-family:var(--mono);font-size:12.5px;letter-spacing:0.5px;}

.section-title{
  font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:var(--rust-deep);border-bottom:1px solid var(--ink);padding-bottom:6px;margin:0 0 14px;
  display:flex;justify-content:space-between;
}

/* Risk panel */
.risk-panel{
  border:2px solid var(--rust);background:#fbf1ec;padding:18px 20px;margin-bottom:28px;border-radius:2px;
}
.risk-panel .rp-head{
  font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--rust-deep);
  text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.risk-panel .rp-head::before{content:'⚠';font-size:14px;}
.risk-panel h3{font-family:var(--serif);font-size:17px;margin:0 0 10px;color:var(--ink);}
.risk-list{margin:0;padding-left:0;list-style:none;}
.risk-list li{
  font-size:14.5px;line-height:1.7;padding:7px 0 7px 22px;position:relative;
  border-top:1px solid rgba(181,80,47,0.18);
}
.risk-list li:first-child{border-top:none;}
.risk-list li::before{content:'›';position:absolute;left:2px;color:var(--rust);font-weight:700;}

/* matched cases */
.case-card{
  border:1px solid var(--line);background:#fff;margin-bottom:14px;border-radius:2px;overflow:hidden;
}
.case-head{
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  padding:14px 18px 10px;border-bottom:1px dashed var(--line);
}
.case-head-main{flex:1;}
.case-id-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.cat-icon{
  font-size:16px;width:26px;height:26px;border-radius:50%;
  background:var(--paper-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.case-title{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink);}
.case-sku{font-family:var(--mono);font-size:11px;color:#9a9082;}
.case-desc-line{font-size:14px;color:var(--rust-deep);margin-top:2px;padding-left:34px;}
.case-meta{font-family:var(--mono);font-size:11px;color:#8a8072;white-space:nowrap;text-align:right;}
.case-score{
  font-family:var(--mono);font-size:10px;color:var(--rust-deep);background:#f3e6dc;
  padding:2px 7px;border-radius:10px;display:inline-block;margin-top:4px;
}
.case-body{padding:12px 18px 16px;}
.case-row{display:flex;gap:8px;margin-bottom:8px;font-size:13.5px;line-height:1.6;}
.case-row .k{font-family:var(--mono);font-size:10.5px;color:#9a9082;min-width:64px;padding-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
.case-row .v{flex:1;white-space:pre-line;}
.badge{
  font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;
}
.badge.done{background:#e3ebe0;color:var(--ok);}
.badge.pending{background:#f5ebd6;color:var(--pending);}
.badge.watch{background:#e6e0f0;color:#6b5a9b;}
.badge.none{background:var(--paper-dim);color:#9a9082;}

/* SOP card */
.sop-card{
  border-left:4px solid var(--moss);background:#fff;padding:16px 20px;margin-bottom:14px;
}
.sop-type{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--moss);margin-bottom:6px;}
.sop-desc{font-size:13.5px;color:#5a5246;margin-bottom:14px;font-style:italic;}
.flow-wrap{display:flex;flex-direction:column;align-items:stretch;gap:0;}
.flow-step{
  display:flex;align-items:flex-start;gap:12px;
  background:#f4f6f1;border:1px solid #d4ddcc;border-radius:4px;
  padding:10px 14px;position:relative;
}
.flow-num{
  font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;
  background:var(--moss);width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.flow-text{font-size:13.5px;line-height:1.55;color:var(--ink);padding-top:1px;}
.flow-text b{color:var(--rust-deep);}
.flow-arrow{
  display:flex;justify-content:center;align-items:center;height:18px;color:#9bab8c;font-size:14px;
}

footer{
  max-width:920px;margin:40px auto 0;padding:20px 24px 0;border-top:1px solid var(--line);
  font-family:var(--mono);font-size:10.5px;color:#a89f8f;text-align:center;
}

/* ---- Mobile responsive ---- */
@media (max-width: 640px){
  .masthead{padding:20px 16px 14px;}
  .masthead h1{font-size:22px;}
  .masthead-row{flex-direction:column;align-items:flex-start;gap:2px;}
  .status-line{flex-direction:column;align-items:flex-start;gap:8px;}
  #refreshBtn{padding:5px 10px;}

  .wrap{padding:22px 16px 60px;}

  .search-row{flex-direction:column;}
  #queryInput{font-size:16px;padding:12px 14px;}
  #searchBtn{padding:12px 0;width:100%;}

  .chips{gap:5px;}
  .chip{font-size:10px;padding:5px 9px;}

  .risk-panel{padding:14px 16px;}
  .risk-panel h3{font-size:15px;}
  .risk-list li{font-size:13.5px;padding-left:18px;}

  .case-card{margin-bottom:12px;}
  .case-head{flex-direction:column;padding:12px 14px 8px;gap:6px;}
  .case-meta{text-align:left;white-space:normal;}
  .case-desc-line{padding-left:0;font-size:13.5px;}
  .case-id-row{flex-wrap:wrap;}
  .case-title{font-size:16px;}
  .case-body{padding:10px 14px 14px;}
  .case-row{flex-direction:column;gap:2px;}
  .case-row .k{min-width:0;}

  .sop-card{padding:14px 16px;}
  .flow-step{padding:9px 12px;gap:9px;}
  .flow-text{font-size:13px;}

  .section-title{font-size:10.5px;}
}
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-row">
    <h1>異常案例查詢台</h1>
    <span class="tag">Anomaly Lookup · 品管現場速查</span>
  </div>
  <div class="masthead-row" style="margin-top:4px;">
    <span class="meta" id="recordCount">載入中…</span>
    <span class="meta" id="dateRange"></span>
  </div>
  <div class="status-line">
    <span><span class="dot off" id="statusDot"></span> <span id="statusText">尚未連接資料來源</span></span>
    <button id="refreshBtn">重新抓取最新資料</button>
  </div>
</div>

<div class="wrap">

  <div class="search-block">
    <span class="search-label">輸入異常描述／品項關鍵字</span>
    <div class="search-row">
      <input type="text" id="queryInput" placeholder="例如：外箱發現蟲蟲、顆粒太大、封口有銀邊..." autocomplete="off">
      <button id="searchBtn">查詢</button>
    </div>
    <div class="hint">系統會用關鍵字模糊比對「異常描述」與「品名」欄位，無須輸入完整句子。</div>
    <div class="chips" id="chipRow"></div>
  </div>

  <div class="results" id="results">
    <div class="empty-state">
      <span class="glyph">— ⌗ —</span>
      <p>輸入關鍵字開始查詢，或點選上方分類快速瀏覽</p>
    </div>
  </div>

</div>

<footer>資料來源：Google Sheet 即時同步 · 僅供內部品管參考，正式判定請依公司既有 SOP 與主管確認</footer>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMaHUfWKOcBffluknDtlKLdjbwfyh8iKSGFWucgmrWjJF-EJwUYFlsG7_69cSNOt9_/exec";

let CASES = [];
let SOP_REF = [];

// ---------- SOP reference (6 categories) — used as fallback / always loaded ----------
const SOP_FALLBACK = [
  {
    type: "顏色相關",
    keywords: ["顏色","色差","較深","較淺","變色","發黃","發黑"],
    desc: "產品顏色較深、有色差或與標準顏色不符。",
    steps: "1. 立即拍照記錄。\n2. 檢查生產批次，比對留樣或歷史數據。\n3. 通知品管或研發部門，判定色差是否超出可接受範圍。\n4. 若品質無虞，提供說明並回覆標準差異；若確認有問題，依內部標準進行報廢或限用，並追溯生產環節尋找根本原因。",
    risks: ["色差是否在客戶可接受公差內，需研發/品管書面確認，避免口頭放行","若同批次有多包異常，要往前追加抽樣，不能只看單一包","留樣比對若無歷史留樣，難以判定是否劣化，需建立留樣機制"]
  },
  {
    type: "質地/規格相關",
    keywords: ["顆粒","太大","太小","水分","硬度","太硬","太軟","規格"],
    desc: "產品水分超標、顆粒大小不對或硬度不符。",
    steps: "1. 立即停止使用並隔離該批次產品。\n2. 複測水分、顆粒或硬度，確認是否超出標準公差。\n3. 若複測異常，通知生產單位檢討製程參數（如烘乾時間、研磨設定）或原料配比。\n4. 根據影響程度決定報廢或調整，並填寫製程異常報告，避免再發。",
    risks: ["水分超標若同時水活性偏高，有微生物風險，不能只看單一數值就放行","若為原料端規格問題，需往供應商端追溯，不只是內部製程調整","\"特允\"放行需留下書面紀錄與簽核，避免日後追溯不到依據"]
  },
  {
    type: "氣味/味道相關",
    keywords: ["油耗味","異味","臭","味道","氣味"],
    desc: "產品有油耗味較重、或有異味。",
    steps: "1. 立即隔離該批次產品，避免擴大污染。\n2. 通知品管或研發部門進行氣味判定及檢測（如油脂酸敗度）。\n3. 判定異味來源（如原料問題、儲存環境、包裝材料）。\n4. 若為原料問題，追溯原料批號並聯繫供應商；若為儲存或包裝問題，檢討倉儲或包裝流程。\n5. 確定處理方式（報廢/限用）並回覆客戶。",
    risks: ["油耗味通常代表油脂氧化，若已出貨需評估是否擴大回收範圍","異味來源不明前不應放行，避免事後才發現是更大範圍的污染","若牽涉寵物食品安全，異味問題比外觀問題優先等級更高"]
  },
  {
    type: "異物/混入",
    keywords: ["蟲","異物","紙張","毛髮","金屬","混入","蟲蟲"],
    desc: "產品中出現非預期物質（如紙張、小蟲）。",
    steps: "1. 立即將異常產品包裝隔離，並記錄發生地點及時間。\n2. 拍照記錄異物類型。\n3. 通知品管部門進行異物分析，並追溯生產線的異物管控點。\n4. 確認異物為製程中混入或環境污染，採取緊急消毒或清理措施。\n5. 該批次產品視情況報廢，並加強生產線的異物偵測與環境清潔檢查。",
    risks: ["異物若為蟲類，需確認是外箱／倉儲污染還是製程中混入，處理範圍差很大","若已流入下游（混料、分裝），要往前往後都追溯，不能只隔離當下這包","客訴風險高，建議同步留樣保存證物，以備後續追查"]
  },
  {
    type: "封口異常",
    keywords: ["封口","銀邊","鋸齒","漏氣","沒封好"],
    desc: "產品內袋或外包裝封口不完整、有鋸齒瑕疵、或封口位置異常。",
    steps: "1. 記錄封口異常的具體狀況及程度。\n2. 檢查異常發生時的包裝機台狀況、封口參數（如溫度、壓力）及包裝袋供應商批次。\n3. 調整機台參數並進行測試，確認封口品質回復正常。\n4. 判定該批次產品是否需全部報廢或重新包裝（若可補救），填寫異常報告以追蹤改善。",
    risks: ["封口不良影響保存期限與密封性，若已出貨需評估食安與保存期限風險","拉力測試合格不代表長期保存沒問題，必要時應加做加速老化測試","機台參數調整後務必留下測試紀錄，作為後續同類異常比對基準"]
  },
  {
    type: "品項錯誤/混料",
    keywords: ["混料","錯誤","品項","裝錯","撿貨","貼標","出貨錯誤"],
    desc: "客戶收到的產品品項/數量與訂單不符，或發現錯誤物料混入（如混到其他產品的原料）。",
    steps: "1. 核對資訊：核對客戶訂單、系統出貨單據及倉庫撿貨紀錄，確認錯誤環節。\n2. 原因分析：判斷是撿貨錯誤、貼標錯誤或裝箱錯誤（品項錯誤）；或投料錯誤（混料）。\n3. 立即修正：安排正確品項補寄，並協調回收錯誤產品。\n4. 流程檢討：根據錯誤原因，檢討倉儲/出貨流程覆核機制（品項錯誤），或檢討原料投料前的二次確認機制（混料）。",
    risks: ["混料若牽涉過敏原（如不同蛋白來源），需立即評估客戶過敏風險，優先等級最高","錯誤已出貨者，要確認收件客戶清單與數量，避免漏通知","同一錯誤模式若過去發生過，要檢查上次的「再發防止」是否真正落實"]
  }
];

function norm(s){ return (s||"").toString().toLowerCase().replace(/\s+/g,""); }

// ---------- Data loading ----------
async function loadData(){
  setStatus("busy","正在抓取最新資料…");
  try {
    const res = await fetch(APPS_SCRIPT_URL, { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const json = await res.json();
    parseJSON(json);
    setStatus("ok","已連接 Google Sheet（Apps Script）· 即時資料");
  } catch(e){
    console.warn("Apps Script fetch failed:", e);
    setStatus("off","無法連線，顯示備援資料（請點右上重新抓取）");
    loadSeedData();
  }
  updateMeta();
  buildChips();
}

function setStatus(kind, text){
  const dot = document.getElementById("statusDot");
  const t = document.getElementById("statusText");
  dot.className = "dot " + (kind==="ok"?"":kind==="busy"?"busy":"off");
  t.textContent = text;
}

function parseJSON(rows){
  const out = [];
  rows.forEach(r=>{
    const desc = (r["異常描述"]||"").toString().trim();
    if(!desc) return;
    out.push({
      date: (r["發生日期"]||"").toString().trim(),
      loc: (r["發生地點"]||"").toString().trim(),
      sku: (r["料號"]||"").toString().trim(),
      cat: (r["產品類別"]||"").toString().trim(),
      name: (r["品名"]||"").toString().trim(),
      desc: desc,
      handle: (r["處理方式"]||"").toString().trim(),
      contact: (r["聯絡人"]||"").toString().trim(),
      status: (r["分類"]||"").toString().trim(),
      note: (r["備註"]||"").toString().trim()
    });
  });
  CASES = out;
}

function loadSeedData(){
  CASES = SEED_CASES;
}

function updateMeta(){
  document.getElementById("recordCount").textContent = `共 ${CASES.length} 筆異常紀錄`;
  const dates = CASES.map(c=>c.date).filter(Boolean);
  if(dates.length){
    document.getElementById("dateRange").textContent = `${dates[0]} ～ ${dates[dates.length-1]}`;
  }
}

function buildChips(){
  const row = document.getElementById("chipRow");
  row.innerHTML = "";
  SOP_FALLBACK.forEach(sop=>{
    const c = document.createElement("button");
    c.className = "chip";
    c.textContent = sop.type;
    c.onclick = ()=>{ document.getElementById("queryInput").value = sop.keywords[0]; runSearch(); };
    row.appendChild(c);
  });
}

// ---------- Matching ----------
function matchSOP(query){
  const q = norm(query);
  let best = null, bestScore = 0;
  SOP_FALLBACK.forEach(sop=>{
    let score = 0;
    sop.keywords.forEach(kw=>{ if(q.includes(norm(kw))) score += 2; });
    if(norm(sop.type).includes(q) || q.includes(norm(sop.type))) score += 1;
    if(score > bestScore){ bestScore = score; best = sop; }
  });
  return bestScore > 0 ? best : null;
}

function matchCases(query){
  const q = norm(query);
  const terms = q.split(/[\s,，、]+/).filter(Boolean);
  const scored = CASES.map(c=>{
    const hay = norm(c.desc + c.name + c.cat + c.note);
    let score = 0;
    if(hay.includes(q) && q.length>0) score += 5;
    terms.forEach(t=>{ if(t.length>=1 && hay.includes(t)) score += 1; });
    return {c, score};
  }).filter(x=>x.score>0);
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,8);
}

function statusBadge(status){
  if(!status) return '<span class="badge none">未標記</span>';
  if(status.includes("已完成")) return '<span class="badge done">已完成</span>';
  if(status.includes("待處理")) return '<span class="badge pending">待處理</span>';
  if(status.includes("待觀察")) return '<span class="badge watch">待觀察</span>';
  return `<span class="badge none">${status}</span>`;
}

function escapeHTML(s){
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

const CAT_ICONS = {
  "原料": "🌾",
  "半成品": "⚙️",
  "成品": "📦",
  "包材": "🧻",
  "設備": "🔧"
};
function catIcon(cat){
  return CAT_ICONS[cat] || "❓";
}

function renderFlow(stepsText){
  // split "1. xxx\n2. yyy\n3. zzz" into individual steps
  const cleaned = stepsText.replace(/\\n/g,"\n");
  const parts = cleaned.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const steps = [];
  parts.forEach(p=>{
    const m = p.match(/^\*{0,2}(\d+)[\.\\]\*{0,2}\s*(.+)$/);
    if(m){ steps.push(m[2]); }
    else if(steps.length){ steps[steps.length-1] += " " + p; }
    else { steps.push(p); }
  });

  let html = '<div class="flow-wrap">';
  steps.forEach((s, i)=>{
    const text = escapeHTML(s).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
    html += `<div class="flow-step"><span class="flow-num">${i+1}</span><span class="flow-text">${text}</span></div>`;
    if(i < steps.length-1) html += '<div class="flow-arrow">↓</div>';
  });
  html += '</div>';
  return html;
}

function runSearch(){
  const query = document.getElementById("queryInput").value.trim();
  const results = document.getElementById("results");
  if(!query){
    results.innerHTML = `<div class="empty-state"><span class="glyph">— ⌗ —</span><p>輸入關鍵字開始查詢，或點選上方分類快速瀏覽</p></div>`;
    return;
  }

  const sop = matchSOP(query);
  const cases = matchCases(query);

  let html = "";

  // SOP suggestion — shown first
  if(sop){
    html += `<div class="section-title"><span>建議處理流程（依分類SOP）</span></div>`;
    html += `<div class="sop-card">
      <div class="sop-type">${escapeHTML(sop.type)}</div>
      <div class="sop-desc">${escapeHTML(sop.desc)}</div>
      ${renderFlow(sop.steps)}
    </div>`;
  }

  // Risk panel — always show if we have any signal (SOP match or cases found)
  if(sop || cases.length){
    const risks = sop ? sop.risks : ["未比對到明確分類，建議先以現場拍照記錄、隔離異常品為原則，再依異常性質判斷是否需要品管/研發/採購介入。","若此異常情形未曾出現過，建議完整記錄處理過程，作為日後比對基準。"];
    html += `<div class="risk-panel" style="margin-top:${sop?'24px':'0'};">
      <div class="rp-head">風險評估提醒</div>
      <h3>${sop ? sop.type+'類異常 · 注意事項' : '尚未比對到標準分類 · 一般注意事項'}</h3>
      <ul class="risk-list">${risks.map(r=>`<li>${escapeHTML(r)}</li>`).join("")}</ul>
    </div>`;
  }

  // Matched historical cases — shown last
  html += `<div class="section-title" style="margin-top:30px;"><span>過去相似案例</span><span>${cases.length} 筆</span></div>`;
  if(cases.length){
    cases.forEach(({c,score})=>{
      html += `<div class="case-card">
        <div class="case-head">
          <div class="case-head-main">
            <div class="case-id-row">
              <span class="cat-icon" title="${escapeHTML(c.cat||'未分類')}">${catIcon(c.cat)}</span>
              <span class="case-title">${escapeHTML(c.name||"（未填品名）")}</span>
              ${c.sku ? `<span class="case-sku">${escapeHTML(c.sku)}</span>` : ""}
            </div>
            <div class="case-desc-line">${escapeHTML(c.desc)}</div>
          </div>
          <div class="case-meta">
            ${escapeHTML(c.date)}<br>${escapeHTML(c.loc)}
            <div class="case-score">比對分數 ${score}</div>
          </div>
        </div>
        <div class="case-body">
          ${c.handle ? `<div class="case-row"><span class="k">處理方式</span><span class="v">${escapeHTML(c.handle)}</span></div>` : ""}
          ${c.contact ? `<div class="case-row"><span class="k">聯絡人</span><span class="v">${escapeHTML(c.contact)}</span></div>` : ""}
          ${c.note ? `<div class="case-row"><span class="k">備註</span><span class="v">${escapeHTML(c.note)}</span></div>` : ""}
          <div class="case-row"><span class="k">狀態</span><span class="v">${statusBadge(c.status)}</span></div>
        </div>
      </div>`;
    });
  } else {
    html += `<div class="empty-state"><p>查無相似案例，這可能是新類型的異常，請完整記錄處理過程</p></div>`;
  }

  results.innerHTML = html;
}
